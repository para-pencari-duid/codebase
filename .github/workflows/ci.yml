name: BakeryWeb CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

jobs:
  validate:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: bakery
          POSTGRES_PASSWORD: bakery_dev_password
          POSTGRES_DB: bakery_pos
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bakery -d bakery_pos"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://bakery:bakery_dev_password@localhost:5432/bakery_pos?schema=public
      AUTH_SECRET: ci-auth-secret-min-32-characters
      AUTH_URL: http://localhost:3000
      NEXTAUTH_URL: http://localhost:3000
      AUTH_TRUST_HOST: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Prisma validate
        run: npx prisma validate

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
