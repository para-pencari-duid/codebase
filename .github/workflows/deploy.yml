name: BakeryWeb CI/CD Production

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: self-hosted # Menggunakan GitHub Runner yang sudah terikat Supervisor

    steps:
      - name: Deploy and Build
        run: |
          # 1. Masuk ke direktori kerja aplikasi
          cd /www/wwwroot/bakery-web
          
          # 2. Sinkronisasi kode dari GitHub
          # Pastikan remote 'origin' sudah terarah ke repo yang benar
          git pull origin main
          
          # 3. Injeksi Path Node.js agar npx/npm dikenali oleh runner
          export PATH=/www/server/nvm/versions/node/v24.14.0/bin:$PATH
          
          # 4. Instalasi & Generasi Prisma (Habitat Native Linux)
          # Menggunakan 'install' tanpa 'ci' agar lebih fleksibel di tahap awal
          npm install
          npx prisma generate
          
          # 5. Kompilasi Next.js (SSR/Static Optimization)
          npm run build
          
          # 6. Manajemen Proses via PM2
          # Menggunakan 'reload' lebih baik daripada 'restart' karena 
          # menjaga aplikasi tetap melayani traffic selama proses update (Zero Downtime).
          # Pastikan aplikasi sudah didaftarkan pertama kali dengan nama 'bakery-web'
          pm2 reload bakery-web --update-env || pm2 start npm --name "bakery-web" -- start