services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bakery}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bakery_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-bakery_pos}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-bakery} -d ${POSTGRES_DB:-bakery_pos}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.docker
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-bakery}:${POSTGRES_PASSWORD:-bakery_dev_password}@db:5432/${POSTGRES_DB:-bakery_pos}?schema=public}
    ports:
      - "3000:3000"
    volumes:
      - ./:/app
      - app_node_modules:/app/node_modules
    command: >
      sh -c "npx prisma generate &&
             npx prisma migrate deploy &&
             npm run dev -- --hostname 0.0.0.0 --port 3000"

volumes:
  postgres_data:
  app_node_modules:
